<section id="products" class="py-32 px-6 bg-black text-white">
  <div class="max-w-7xl mx-auto">

    <div class="mb-20">
      <span class="!font-mono text-xs uppercase tracking-[0.3em] text-white/40 mb-4 block">
        Tienda
      </span>
      <h2 class="text-5xl md:text-7xl !font-display">
        Nuestros Productos
      </h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-1">
      <div
        *ngFor="let producto of productosMostrados; let i = index"
        class="border border-white/5 hover:bg-white/5 transition-colors group overflow-hidden flex flex-col"
      >
        <div class="relative overflow-hidden h-56">
          <img
            [src]="producto.imagen_url"
            [alt]="producto.nombre"
            class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500"
          />
          <span
            class="absolute top-3 right-3 !font-mono text-[10px] uppercase tracking-widest px-2 py-1"
            [ngClass]="{
              'text-emerald-400 bg-emerald-400/10': producto.stock > 0,
              'text-red-400 bg-red-400/10': producto.stock === 0
            }"
          >
            {{ producto.stock > 0 ? 'En stock' : 'Agotado' }}
          </span>
          <span class="absolute bottom-3 left-3 font-mono text-xs opacity-20 group-hover:opacity-100 transition-opacity">
            0{{ i + 1 }}
          </span>
        </div>

        <div class="p-6 flex flex-col flex-1">
          <h3 class="text-xl mb-2">{{ producto.nombre }}</h3>
          <p class="text-sm text-white/50 leading-relaxed mb-6">{{ producto.descripcion }}</p>

          <div class="flex items-center justify-between mt-auto">
            <span class="!font-mono text-sm text-white/70">
              S/. {{ producto.precio }}
            </span>

            <button
              (click)="agregarAlCarrito(producto)"
              [disabled]="producto.stock === 0"
              class="flex items-center gap-2 px-4 py-2 text-xs font-mono uppercase tracking-widest border transition-all cursor-pointer"
              [ngClass]="producto.stock > 0
                ? 'border-white/20 text-white hover:bg-white hover:text-black'
                : 'border-white/5 text-white/20 cursor-not-allowed'"
            >
              <span class="material-symbols-outlined text-sm">add_shopping_cart</span>
              Agregar
            </button>
          </div>
        </div>

      </div>
    </div>

  </div>
</section>
