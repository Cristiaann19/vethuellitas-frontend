<section id="faq" class="py-32 px-6 bg-[#f8faf8] text-[#1b1b1b]">
  <div class="max-w-3xl mx-auto">

    <div class="text-center mb-20">
      <span class="font-mono text-xs uppercase tracking-[0.3em] text-[#52b788] mb-4 block">Dudas</span>
      <h2 class="text-5xl md:text-7xl font-display text-[#1b1b1b]">Preguntas Frecuentes</h2>
    </div>

    <div class="space-y-3">
      @for (faq of faqs; track i; let i = $index) {
        <div class="border border-gray-200 rounded-xl overflow-hidden bg-white">
          <button
            (click)="toggle(i)"
            class="w-full p-6 flex items-center justify-between text-left hover:bg-[#f0faf4] transition-colors">
            <span class="font-medium text-[#1b1b1b]">{{ faq.pregunta }}</span>
            <span
              class="material-symbols-outlined text-[#52b788] transition-transform duration-500"
              [class.rotate-180]="openIndex === i">
              expand_more
            </span>
          </button>
          <div
            class="overflow-hidden transition-all duration-500 ease-in-out"
            [style.maxHeight]="openIndex === i ? '500px' : '0px'"
            [style.opacity]="openIndex === i ? '1' : '0'">
            <div class="p-6 pt-0 text-[#6b7280] leading-relaxed border-t border-gray-100">
              {{ faq.respuesta }}
            </div>
          </div>
        </div>
      }
    </div>

  </div>
</section>
