<section id="faq" class="py-32 px-6 bg-black text-white">
  <div class="max-w-3xl mx-auto">

    <div class="text-center mb-20">
      <span class="!font-mono text-xs uppercase tracking-[0.3em] text-white/40 mb-4 block">Dudas</span>
      <h2 class="text-5xl md:text-7xl !font-display">Preguntas Frecuentes</h2>
    </div>

    <div class="space-y-4">
      @for (faq of faqs; track i; let i = $index) {
        <div class="border border-white/5 rounded-xl overflow-hidden">

          <!-- Pregunta -->
          <button
            (click)="toggle(i)"
            class="w-full p-6 flex items-center justify-between text-left hover:bg-white/5 transition-colors"
          >
            <span class="font-medium">{{ faq.pregunta }}</span>
            <span
              class="material-symbols-outlined text-white/40 transition-transform duration-500"
              [class.rotate-180]="openIndex === i"
            >
              expand_more
            </span>
          </button>

          <!-- Respuesta animada -->
          <div
            class="overflow-hidden transition-all duration-500 ease-in-out"
            [style.maxHeight]="openIndex === i ? '500px' : '0px'"
            [style.opacity]="openIndex === i ? '1' : '0'"
          >
            <div class="p-6 pt-0 text-white/40 leading-relaxed">
              {{ faq.respuesta }}
            </div>
          </div>

        </div>
      }
    </div>

  </div>
</section>
