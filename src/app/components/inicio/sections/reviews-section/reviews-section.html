<section id="reviews" class="bg-white py-32 px-6 text-[#1b1b1b]">
  <div class="max-w-7xl mx-auto">

    <div class="text-center mb-20">
      <span class="font-mono text-xs uppercase tracking-[0.3em] text-[#52b788] mb-4 block">Comunidad</span>
      <h2 class="text-5xl md:text-7xl font-display text-[#1b1b1b]">Lo que dicen de Nosotros</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (re of revs; track i; let i = $index) {
        <div
          class="p-8 bg-[#f8faf8] border border-gray-200 hover:border-[#52b788]/40 rounded-2xl flex flex-col justify-between hover:shadow-lg hover:shadow-[#52b788]/10 transition-all group">

          <span class="font-mono text-4xl text-[#52b788]/20 group-hover:text-[#52b788]/40 transition-colors mb-4 block">"</span>
          <p class="text-base italic text-[#6b7280] leading-relaxed mb-8">{{ re.descripcion }}</p>

          <div class="flex items-center gap-4 border-t border-gray-100 pt-6">
            <div
              class="w-10 h-10 rounded-full bg-[#d8f3dc] flex items-center justify-center font-mono text-sm text-[#2d6a4f] font-bold">
              {{ re.usuario.charAt(0).toUpperCase() }}
            </div>
            <div>
              <h4 class="font-display text-base text-[#1b1b1b]">{{ re.usuario }}</h4>
              <p class="text-[10px] uppercase tracking-widest text-[#6b7280]">{{ re.fecha }}</p>
            </div>
          </div>
        </div>
      }
    </div>

  </div>
</section>
