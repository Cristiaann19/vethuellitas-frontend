<section id="reviews" class="bg-[#050505] py-32 px-6 text-white">
  <div class="max-w-7xl mx-auto">

    <div class="text-center mb-20">
      <span class="!font-mono text-xs uppercase tracking-[0.3em] text-white/40 mb-4 block">Comunidad</span>
      <h2 class="text-5xl md:text-7xl !font-display">Lo que dicen de Nosotros</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (re of revs; track i; let i = $index) {
        <div class="p-8 bg-white/5 border border-white/5 rounded-2xl flex flex-col justify-between hover:bg-white/10 transition-colors group">

          <span class="!font-mono text-4xl text-white/10 group-hover:text-white/20 transition-colors mb-4 block">"</span>

          <p class="text-base italic text-white/60 leading-relaxed mb-8">{{ re.descripcion }} </p>

          <div class="flex items-center gap-4 border-t border-white/5 pt-6">
            <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center font-mono text-sm">
              {{ re.usuario.charAt(0).toUpperCase() }}
            </div>
            <div>
              <h4 class="!font-display text-base">{{ re.usuario }}</h4>
              <p class="text-[10px] uppercase tracking-widest opacity-30">{{ re.fecha }}</p>
            </div>
          </div>
        </div>
      }
    </div>

  </div>
</section>
