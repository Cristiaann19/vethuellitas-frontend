<nav
  [ngClass]="{
    'py-4 bg-black/40 backdrop-blur-md border-b border-white/10': isScrolled,
    'py-8 bg-transparent': !isScrolled
  }"
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-500 ease-in-out text-white"
>
  <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">

    <!-- Logo -->
    <a class="!font-display text-2xl tracking-tighter">
      Huellitas<span class="text-xs ml-1 opacity-50 italic">Vet</span>
    </a>

    <!-- Links -->
    <div class="hidden md:flex items-center space-x-8">
      <a [routerLink]="['/inicio']" fragment="about"
         class="cursor-pointer text-[10px] uppercase tracking-[0.2em] font-medium opacity-60 hover:opacity-100 transition-opacity">Sobre
        nosotros</a>
      <a [routerLink]="['/inicio']" fragment="services"
         class="cursor-pointer text-[10px] uppercase tracking-[0.2em] font-medium opacity-60 hover:opacity-100 transition-opacity">Servicios</a>
      <a [routerLink]="['/inicio']" fragment="products"
         class="cursor-pointer text-[10px] uppercase tracking-[0.2em] font-medium opacity-60 hover:opacity-100 transition-opacity">Productos</a>
      <a [routerLink]="['/inicio']" fragment="reviews"
         class="cursor-pointer text-[10px] uppercase tracking-[0.2em] font-medium opacity-60 hover:opacity-100 transition-opacity">Opiniones</a>
      <a [routerLink]="['/inicio']" fragment="faq"
         class="cursor-pointer text-[10px] uppercase tracking-[0.2em] font-medium opacity-60 hover:opacity-100 transition-opacity">FAQ</a>
      <a [routerLink]="['/inicio']" fragment="contact"
         class="cursor-pointer text-[10px] uppercase tracking-[0.2em] font-medium opacity-60 hover:opacity-100 transition-opacity">Contacto</a>
    </div>

    <!-- Botón login + menú mobile -->
    <div class="flex items-center gap-4">

      <!-- Si NO está logueado -->
      @if (!isLoggedIn) {
        <a
          routerLink="/login"
          class="hidden md:flex items-center gap-2 text-[10px] uppercase tracking-[0.2em] font-medium px-5 py-2.5 rounded-full border border-white/20 hover:bg-white hover:text-black transition-all duration-500"
        >
          <span class="material-symbols-outlined text-sm">login</span>
          Iniciar Sesión
        </a>
      }

      <!-- Si SÍ está logueado -->
      @if (isLoggedIn) {
        <div class="relative hidden md:block">
          <button
            (click)="toggleMenuPerfil()"
            class="flex items-center cursor-pointer gap-3 px-4 py-2 rounded-full border border-white/20 hover:bg-white/10 transition-all duration-300"
          >
            <div class="w-7 h-7 rounded-full bg-white text-black flex items-center justify-center text-xs font-bold">
              {{ inicial }}
            </div>
            <span class="text-[10px] uppercase tracking-[0.2em] font-medium">{{ nombre }}</span>
            <span class="material-symbols-outlined text-sm">expand_more</span>
          </button>

          <!-- Dropdown -->
          <!-- Dropdown -->
          @if (menuPerfil) {
            <div class="absolute right-0 mt-2 w-48 bg-black/90 backdrop-blur-md border border-white/10 rounded-xl overflow-hidden">

              <a href="#"
                 class="flex items-center gap-3 px-4 py-3 text-[10px] uppercase tracking-widest hover:bg-white/10 transition-colors">
                <span class="material-symbols-outlined text-sm">person</span>
                Mi perfil
              </a>


              <a routerLink="/mis-mascotas"
                 class="flex items-center gap-3 px-4 py-3 text-[10px] uppercase tracking-widest hover:bg-white/10 transition-colors">
                <span class="material-symbols-outlined text-sm">pets</span>
                Mis mascotas
              </a>

              <a routerLink="/agendar-cita"
                 class="flex items-center gap-3 px-4 py-3 text-[10px] uppercase tracking-widest hover:bg-white/10 transition-colors">
                <span class="material-symbols-outlined text-sm">calendar_month</span>
                Agendar cita
              </a>

              <a routerLink="/mis-citas"
                 class="flex items-center gap-3 px-4 py-3 text-[10px] uppercase tracking-widest hover:bg-white/10 transition-colors">
                <span class="material-symbols-outlined text-sm">event</span>
                Mis citas
              </a>

              <a routerLink="/mis-compras"
                 class="flex items-center gap-3 px-4 py-3 text-[10px] uppercase tracking-widest hover:bg-white/10 transition-colors">
                <span class="material-symbols-outlined text-sm">shopping_bag</span>
                Mis compras
              </a>

              <button (click)="cerrarSesion()"
                      class="w-full flex cursor-pointer items-center gap-3 px-4 py-3 text-[10px] uppercase tracking-widest text-red-400 hover:bg-red-400/10 transition-colors">
                <span class="material-symbols-outlined text-sm">logout</span>
                Cerrar sesión
              </button>
            </div>
          }
        </div>
      }

      <button class="md:hidden text-white">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>

  </div>
</nav>
